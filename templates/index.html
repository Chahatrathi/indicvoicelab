<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indic Voice Lab | AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pure-black: #000000;
            --glass-white: rgba(255, 255, 255, 0.25);
        }
        
        body {
            background-image: url("{{ url_for('static', filename='images/background.jpeg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--pure-black);
            font-family: 'Rajdhani', sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        
        .glass-panel {
            background: var(--glass-white); 
            backdrop-filter: blur(30px);
            border: 3px solid var(--pure-black); 
            border-radius: 24px;
            padding: 40px; 
            width: 460px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center; 
            z-index: 10;
        }
        
        h2 {
            font-family: 'Orbitron', sans-serif; 
            letter-spacing: 2px;
            color: var(--pure-black);
            font-weight: 900;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        
        textarea {
            width: 100%; 
            height: 120px; 
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid var(--pure-black); 
            border-radius: 12px;
            color: var(--pure-black); 
            padding: 15px; 
            outline: none; 
            box-sizing: border-box;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* Styling for the new translation display */
        .translation-display {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px dashed var(--pure-black);
            border-radius: 8px;
            font-style: italic;
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        select {
            width: 100%; 
            margin: 20px 0; 
            padding: 12px;
            background: rgba(255, 255, 255, 0.15);
            color: var(--pure-black); 
            border: 2px solid var(--pure-black);
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 700;
        }
        
        button {
            width: 100%; 
            padding: 16px; 
            background: var(--pure-black);
            border: 2px solid var(--pure-black); 
            color: #ffffff;
            font-family: 'Orbitron', sans-serif; 
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer; 
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        button:hover { 
            background: transparent;
            color: var(--pure-black);
        }
        
        audio { 
            width: 100%; 
            margin-top: 20px;
        }
        
        .status { 
            font-size: 0.85rem; 
            color: var(--pure-black);
            text-transform: uppercase; 
            margin-bottom: 10px; 
            font-weight: 900;
            letter-spacing: 1.5px;
        }
        
        .result-panel {
             margin-top: 25px;
             border-top: 2px solid rgba(0, 0, 0, 0.15);
             padding-top: 20px;
        }

        .download-link {
            display: inline-block;
            margin-top: 15px;
            color: var(--pure-black);
            text-decoration: none;
            border-bottom: 2px solid var(--pure-black);
            font-weight: 900;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="status">● AI Translation System Active</div>
        <h2> BHARAT KI BHASHAE </h2>
        <form action="/convert" method="POST">
            <textarea name="text" placeholder="Type in any language..." required></textarea>
            
            <select name="voice">
                {% for key, data in voices.items() %}
                    <option value="{{ key }}">{{ data.name }}</option>
                {% endfor %}
            </select>
            
            <button type="submit">Translate & Synthesize</button>
        </form>

        {% if audio %}
            <div class="result-panel">
                <div class="status">Audio Generated</div>
                
                <div class="translation-display">
                    "{{ translated }}"
                </div>

                <audio controls autoplay>
                    <source src="{{ url_for('static', filename='outputs/' + audio) }}" type="audio/mpeg">
                </audio>
                <br>
                <a href="{{ url_for('static', filename='outputs/' + audio) }}" download class="download-link">
                   DOWNLOAD_AUDIO
                </a>
            </div>
        {% endif %}
    </div>
</body>
</html>
