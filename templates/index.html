<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indic Voice Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --black: #000; --glass: rgba(255, 255, 255, 0.25); }
        body, html { margin: 0; padding: 0; height: 100%; scroll-behavior: smooth; }
        body {
            background-image: url("{{ url_for('static', filename='images/background.jpeg') }}");
            background-size: cover; background-attachment: fixed;
            color: var(--black); font-family: 'Rajdhani', sans-serif;
        }
        .section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(25px); border: 3px solid var(--black); border-radius: 24px; padding: 40px; width: 100%; max-width: 480px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        h2 { font-family: 'Orbitron', sans-serif; font-weight: 900; margin-top: 0; text-transform: uppercase; }
        textarea { width: 100%; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid var(--black); border-radius: 12px; padding: 15px; font-weight: 700; box-sizing: border-box; }
        select, .btn-main { width: 100%; margin: 15px 0; padding: 15px; border: 2px solid var(--black); border-radius: 12px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; }
        .btn-main { background: var(--black); color: #fff; text-transform: uppercase; }
        .btn-main:hover { background: transparent; color: var(--black); }
        .stt-result { margin-top: 20px; min-height: 80px; border: 2px dashed var(--black); padding: 15px; border-radius: 12px; font-weight: 900; background: rgba(255,255,255,0.2); text-align: left; }
    </style>
</head>
<body>

    <div class="section" id="tts">
        <div class="glass-panel">
            <h2>Synthesis</h2>
            <form action="/convert" method="POST">
                <textarea id="main-text" name="text" placeholder="WRITE HERE..." required></textarea>
                <select name="voice">
                    {% for key, data in voices.items() %}
                        <option value="{{ key }}">{{ data.name }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="btn-main">Generate Audio</button>
            </form>
            {% if audio_path %}
                <div style="margin-top:20px; border-top: 2px solid black; padding-top:15px;">
                    <p><b>Converted:</b> {{ translated }}</p>
                    <audio id="audioPlayer" controls autoplay style="width:100%">
                        <source src="{{ audio_path }}" type="audio/mpeg">
                    </audio>
                </div>
            {% endif %}
        </div>
    </div>

    <div class="section" id="stt">
        <div class="glass-panel">
            <h2>Recording</h2>
            <select id="mic-lang">
                {% for key, data in voices.items() %}
                    <option value="{{ data.mic_code }}">{{ data.name.split(' (')[0] }}</option>
                {% endfor %}
            </select>
            <button class="btn-main" id="rec-btn">🎤 START RECORDING</button>
            <div class="stt-result" id="stt-out">...</div>
            <button class="btn-main" onclick="toTTS()" style="background:#fff; color:#000;">USE IN SYNTHESIS</button>
        </div>
    </div>

    <script>
        // Force reload if player stays at 0:00
        const player = document.getElementById('audioPlayer');
        if (player) {
            player.addEventListener('error', () => {
                setTimeout(() => { player.load(); }, 500);
            });
        }

        function toTTS() {
            document.getElementById('main-text').value = document.getElementById('stt-out').innerText;
            window.scrollTo(0,0);
        }

        const recBtn = document.getElementById('rec-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recBtn.onclick = () => {
                recognition.lang = document.getElementById('mic-lang').value;
                recognition.start();
                recBtn.innerText = "LISTENING...";
            };
            recognition.onresult = (e) => {
                document.getElementById('stt-out').innerText = e.results[0][0].transcript;
                recBtn.innerText = "🎤 START RECORDING";
            };
            recognition.onerror = () => { recBtn.innerText = "🎤 START RECORDING"; };
        }
    </script>
</body>
</html>
