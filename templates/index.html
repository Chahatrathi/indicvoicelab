<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indic Voice Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --black: #000; --glass: rgba(255, 255, 255, 0.25); }
        body, html { margin: 0; padding: 0; min-height: 100%; scroll-behavior: smooth; }
        body {
            background-image: url("{{ url_for('static', filename='images/background.jpeg') }}");
            background-size: cover; background-attachment: fixed; background-position: center;
            color: var(--black); font-family: 'Rajdhani', sans-serif;
        }
        .section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); border: 3px solid var(--black); border-radius: 20px; padding: 30px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        h2 { font-family: 'Orbitron', sans-serif; font-weight: 900; text-transform: uppercase; margin-top: 0; letter-spacing: 1px; }
        textarea { width: 100%; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid var(--black); border-radius: 10px; padding: 12px; font-weight: 700; box-sizing: border-box; font-size: 1rem; color: #000; transition: all 0.3s; }
        .flash-text { background: rgba(0,0,0,0.1); border-color: #000; transform: scale(1.02); }
        select, .btn-main { width: 100%; margin: 12px 0; padding: 14px; border: 2px solid var(--black); border-radius: 10px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; }
        .btn-main { background: var(--black); color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .btn-main:hover { background: transparent; color: #000; }
        .stt-result { margin-top: 15px; min-height: 70px; border: 2px dashed var(--black); padding: 12px; border-radius: 10px; font-weight: 700; background: rgba(255,255,255,0.1); text-align: left; }
    </style>
</head>
<body>

    <div class="section" id="top">
        <div class="glass-panel">
            <h2>Synthesis</h2>
            <form id="ttsForm" action="/convert#top" method="POST">
                <textarea id="txtArea" name="text" placeholder="ENTER TEXT..." required></textarea>
                <select name="voice">
                    {% for k, v in voices.items() %}
                        <option value="{{ k }}">{{ v.name }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="btn-main">Generate Voice</button>
            </form>
            {% if audio_path %}
                <div style="margin-top:15px; border-top: 2px solid black; padding-top:10px;">
                    <p><b>Converted:</b> {{ translated }}</p>
                    <audio id="audioPlayer" controls autoplay style="width:100%">
                        <source src="{{ audio_path }}" type="audio/mpeg">
                    </audio>
                </div>
            {% endif %}
        </div>
    </div>

    <div class="section" id="bottom">
        <div class="glass-panel">
            <h2>Recording</h2>
            <select id="mic-lang">
                {% for k, v in voices.items() %}
                    <option value="{{ v.mic_code }}">{{ v.name.split(' (')[0] }}</option>
                {% endfor %}
            </select>
            <button class="btn-main" id="micBtn">🎤 Click to Speak</button>
            <div class="stt-result" id="sttOut">...</div>
            <button class="btn-main" onclick="useInTts()" style="background:#fff; color:#000;">Use in Synthesis</button>
        </div>
    </div>

    <script>
        // Automatic retry for Vercel audio stream
        const player = document.getElementById('audioPlayer');
        if (player) {
            player.addEventListener('error', () => {
                console.log("Stream sync issue, retrying...");
                setTimeout(() => { player.load(); }, 800);
            });
        }

        function useInTts() {
            const sttText = document.getElementById('sttOut').innerText;
            const targetArea = document.getElementById('txtArea');
            
            if (sttText && sttText !== "...") {
                targetArea.value = sttText;
                // Visual feedback
                targetArea.classList.add('flash-text');
                setTimeout(() => targetArea.classList.remove('flash-text'), 500);
                
                // Scroll to Top
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                alert("Please record some audio first!");
            }
        }

        const micBtn = document.getElementById('micBtn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            micBtn.onclick = () => {
                recognition.lang = document.getElementById('mic-lang').value;
                recognition.start();
                micBtn.innerText = "Listening...";
                micBtn.style.background = "#ff3b3b";
            };
            recognition.onresult = (e) => {
                document.getElementById('sttOut').innerText = e.results[0][0].transcript;
                micBtn.innerText = "🎤 Click to Speak";
                micBtn.style.background = "#000";
            };
            recognition.onend = () => {
                micBtn.innerText = "🎤 Click to Speak";
                micBtn.style.background = "#000";
            };
        } else {
            micBtn.innerText = "Mic Not Supported";
        }
    </script>
</body>
</html>
